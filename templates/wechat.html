<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #0A0A14; color: #F8FAFC; line-height: 1.8; }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 32px; }
    .header { text-align: center; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
    h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; background: linear-gradient(135deg, #FF0080 0%, #00FFFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
    .summary { font-size: 20px; color: #808090; }
    .content { font-size: 18px; color: #C0C0D0; line-height: 1.9; }
    .content h2 { font-size: 28px; font-weight: 700; margin: 36px 0 16px; color: #F8FAFC; }
    .content h3 { font-size: 22px; font-weight: 600; margin: 28px 0 12px; color: #F8FAFC; }
    .content p { margin-bottom: 16px; }
    .content a { color: #00FFFF; }
    .content strong { color: #FF0080; }
    .grid-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(#FF008010 1px, transparent 1px), linear-gradient(90deg, #FF008010 1px, transparent 1px), linear-gradient(#00FFFF08 1px, transparent 1px), linear-gradient(90deg, #00FFFF08 1px, transparent 1px); background-size: 100px 100px, 100px 100px, 50px 50px, 50px 50px; pointer-events: none; z-index: -1; }
    .footer { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.1); color: #808090; font-size: 14px; }
    @media (max-width: 640px) { h1 { font-size: 36px; } .container { padding: 32px 20px; } }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <div class="header">
      <h1>{title}</h1>
      <p class="summary">{summary}</p>
    </div>
    <div class="content">
      {content}
    </div>
    <div class="footer">
      <p>由 Video Creator 生成</p>
    </div>
  </div>
</body>
</html>
