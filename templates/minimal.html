<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #0F172A; color: #F8FAFC; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 24px; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1.5rem; }
    p { font-size: 1.125rem; line-height: 1.8; color: #94A3B8; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{title}</h1>
    {content}
  </div>
</body>
</html>
