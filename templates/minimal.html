<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #0A0A14; color: #F8FAFC; line-height: 1.8; }
    .container { max-width: 880px; margin: 0 auto; padding: 60px 40px; }
    h1 { font-size: 72px; font-weight: 800; margin-bottom: 24px; background: linear-gradient(135deg, #FF0080 0%, #00FFFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.15; }
    h2 { font-size: 36px; font-weight: 700; margin: 48px 0 20px; background: linear-gradient(135deg, #FF0080 0%, #00FFFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h3 { font-size: 28px; font-weight: 600; margin: 32px 0 16px; color: #F8FAFC; }
    p { font-size: 20px; color: #C0C0D0; margin-bottom: 20px; line-height: 1.8; }
    a { color: #00FFFF; text-decoration: none; }
    a:hover { opacity: 0.8; }
    strong { color: #FF0080; }
    .grid-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(#FF008010 1px, transparent 1px), linear-gradient(90deg, #FF008010 1px, transparent 1px), linear-gradient(#00FFFF08 1px, transparent 1px), linear-gradient(90deg, #00FFFF08 1px, transparent 1px); background-size: 100px 100px, 100px 100px, 50px 50px, 50px 50px; pointer-events: none; z-index: -1; }
    @media (max-width: 640px) { h1 { font-size: 48px; } h2 { font-size: 28px; } p { font-size: 18px; } .container { padding: 40px 20px; } }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <h1>{title}</h1>
    {content}
  </div>
</body>
</html>
